name: Docker Publish

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - ".dockerignore"
      - "app/**"
      - "public/**"
      - "Dockerfile"
      - "next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
  workflow_dispatch:

env:
  REGISTRY_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/hthompson

permissions:
  contents: read

# Prevent multiple runs from building/pushing at the same time for the same ref (branch).
# If a new commit lands, cancel the in-progress run and build the newest commit instead.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Login to Docker Hardened Images
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: dhi.io
          username: ${{ vars.DHI_USERNAME || vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push
        id: buildpush
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          push: true
          # Attaches an SBOM attestation (software bill of materials). (Supply-chain metadata)
          sbom: true
          # Attaches a SLSA provenance attestation (how this image was built). (Supply-chain metadata)
          provenance: mode=max
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.REGISTRY_IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          ## The `scope=` keeps amd64 and arm64 caches from colliding with each other.
          cache-from: type=gha,scope=hthompson-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=hthompson-${{ matrix.arch }}

      - name: Save digest to file
        run: |
          echo "${{ steps.buildpush.outputs.digest }}" > digest-${{ matrix.arch }}.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: digest-${{ matrix.arch }}
          path: digest-${{ matrix.arch }}.txt
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Login to Docker Hardened Images
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: dhi.io
          username: ${{ vars.DHI_USERNAME || vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Download digest artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          pattern: digest-*
          merge-multiple: true

      - name: Create and push multi-arch manifest (:latest)
        run: |
          AMD64_DIGEST="$(cat digest-amd64.txt)"
          ARM64_DIGEST="$(cat digest-arm64.txt)"

          docker buildx imagetools create \
            -t "${{ env.REGISTRY_IMAGE }}:latest" \
            "${{ env.REGISTRY_IMAGE }}@${AMD64_DIGEST}" \
            "${{ env.REGISTRY_IMAGE }}@${ARM64_DIGEST}"
